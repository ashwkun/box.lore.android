name: Unit Tests

on:
  push:
    branches: [ master, main, "cursor/**" ]
  pull_request:
    branches: [ master, main ]

jobs:
  unit-tests:
    name: testDebugUnitTest
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      # Real google-services.json lives in the GitHub Environment "release"
      # (GOOGLE_SERVICES_JSON_BASE64) and is not available to PR/push CI.
      # This stub only satisfies the Google Services Gradle plugin for unit tests.
      - name: Write CI stub google-services.json
        run: |
          python3 - <<'PY'
          from pathlib import Path
          path = Path("app/google-services.json")
          path.write_text(
              """{
            "project_info": {
              "project_number": "0",
              "project_id": "boxlore-ci-unit-stub",
              "storage_bucket": "boxlore-ci-unit-stub.appspot.com"
            },
            "client": [
              {
                "client_info": {
                  "mobilesdk_app_id": "1:0:android:0",
                  "android_client_info": {
                    "package_name": "cx.aswin.boxlore"
                  }
                },
                "oauth_client": [],
                "api_key": [{ "current_key": "ci-unit-stub-not-a-real-key" }],
                "services": {
                  "appinvite_service": {
                    "other_platform_oauth_client": []
                  }
                }
              }
            ],
            "configuration_version": "1"
          }
          """,
              encoding="utf-8",
          )
          path.chmod(0o600)
          print(f"Wrote CI stub {path}")
          PY

      - name: Run unit tests
        run: ./gradlew testDebugUnitTest --continue

      - name: Scrub google-services.json
        if: always()
        run: rm -f app/google-services.json
