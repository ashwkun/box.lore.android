name: Unit Tests

on:
  push:
    branches: [ master, main, "cursor/**" ]
  pull_request:
    branches: [ master, main ]

jobs:
  unit-tests:
    name: testDebugUnitTest
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Write google-services.json from secrets
        env:
          GOOGLE_SERVICES_JSON_BASE64: ${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}
        run: |
          python3 - <<'PY'
          import base64
          import binascii
          import os
          from pathlib import Path

          # Never print secret material. Fail closed if missing/invalid.
          raw = os.environ.get("GOOGLE_SERVICES_JSON_BASE64", "").strip()
          if not raw:
              raise SystemExit("Missing secret GOOGLE_SERVICES_JSON_BASE64")

          try:
              payload = base64.b64decode(raw, validate=True)
          except (ValueError, binascii.Error) as exc:
              raise SystemExit("GOOGLE_SERVICES_JSON_BASE64 is not valid Base64") from exc

          if not payload:
              raise SystemExit("GOOGLE_SERVICES_JSON_BASE64 decoded to an empty file")

          path = Path("app/google-services.json")
          path.parent.mkdir(parents=True, exist_ok=True)
          path.write_bytes(payload)
          path.chmod(0o600)
          print(f"Wrote {path} ({len(payload)} bytes)")
          PY

      - name: Run unit tests
        run: ./gradlew testDebugUnitTest --continue

      - name: Scrub google-services.json
        if: always()
        run: rm -f app/google-services.json
