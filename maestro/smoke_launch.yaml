appId: cx.aswin.boxlore
---
- launchApp
# First-run / consent surfaces may appear; skip when present.
- tapOn:
    text: ".*(Accept|Allow|Continue|Skip|Not now).*"
    optional: true
- extendedWaitUntil:
    visible:
      id: "home_settings_button"
    timeout: 20000
# Strict gate: home Settings affordance must be visible (testTag preferred).
- assertVisible:
    id: "home_settings_button"
